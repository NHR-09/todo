name: marvel_todo
description: "Marvel-themed productivity app with todo management, YouTube lectures, and gamification."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  path: ^1.9.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  http: ^1.6.0
  url_launcher: ^6.3.1
  youtube_player_flutter: ^9.1.1
  flutter_local_notifications: ^18.0.1
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.10+1
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^5.6.12
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  adaptive_icon_background: "#FFF3E6"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
